<!DOCTYPE html>
<html>
<head>
    <title>War - a card game</title>
    <style>
        body{
            background-color: #0e520e;
        }

        h1{
            text-align: center;

        }

        .cards{
            display:flex;
            justify-content: space-between;
            gap: 20px;
            width: 100%;
            padding: 10px;
        }

       /*.card{
            flex:1;
            width: 100%;
            height: auto;
            display: block;
            border-radius: 8px;
        }
        
        .left-card{
            transform: rotate(1deg);
        }

        .right-card{
            transform:rotate(-1deg);
        }*/
        
        .cards{
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr;
            width: 100%;
            border-radius: 8px;
            
        }
        .left-card{
            grid-column: 2;
        }
        .right-card{
            grid-column: 5;
        }
    </style>
</head>
<body>
    <header>
    <h1>♣️♥️ War - a card game ♠️♦️</h1>
    </header>

    <main>
        <div class="cards">
            <div class="left-card">
                <p>Your Card</p>
                <img 
                    src="./assets/black.png" 
                    class="card"
                    id="left-card"
                >
            </div>

            <div class="right-card">
                <p class="right">Opponent Card</p>
                <img src="./assets/10C.png" class="card" id="right-card">
            </div>
        </div>
    </main>

    <footer>
    </footer>
</body>
</html>
