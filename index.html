<!DOCTYPE html>
<html>
<head>
    <title>War - a card game</title>
    <style>
        body{
            background-color: #0e520e;
        }

        h1{
            text-align: center;

        }

        .cards{
            display:flex;
            justify-content: space-between;
            gap: 20px;
            width: 100%;
            padding: 10px;
        }

        .card{
            flex:1;

            width: 100%;
            height: auto;
            display: block;
            border-radius: 8px;
        }
        
        .left-card{
            transform: rotate(1deg);
        }

        .right-card{
            transform:rotate(-1deg);
        }

        .labels{
            display: flex;
            justify-content: space-between;
            gap: 20px;
            padding: 0 10px;
        }

        .labels p{
            flex:1;
            text-align: center;
            margin: 0 0 10px 0;
            font-weight: bold;
            color:white
        }
    </style>
</head>
<body>
    <header>
    <h1>♣️♥️ War - a card game ♠️♦️</h1>
    </header>

    <main>
        <div class="labels">
            <p class="left">Your Card</p>
            <p class="right">Opponent Card</p>
        </div>

        <div class="cards">
            <div class="left-card">
                <img 
                    src="./assets/placeholder_card_back.png" 
                    class="card"
                    id="left-card"
                >
            </div>

            <div class="right-card">
                <img src="./assets/placeholder_card_back.png" class="card" id="right-card">
            </div>
        </div>
    </main>

    <footer>
    </footer>
    
    <script>
        const leftCard = document.getElementById("left-card");

        function flipLeftCard() {
            leftCard.src = "./assets/placeholder_card_face.png";
        }

        //flipLeftCard()

        let angle = -2;

        function shakeLeftCard() {
            const shake = setInterval(() => {
                leftCard.style.transform=`rotate(${angle}deg)`;
                angle = angle == -2 ? 2 : 2;
            }, 100 );

            setTimeout(() => {
                clearInterval(shake);
                leftCard.style.transform = "rotate(1deg)";
            })
        }
        shakeLeftCard();

    </script>
</body>
</html>
