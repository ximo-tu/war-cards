<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>War - a card game</title>
    <style>
        :root{
            --bg:#0e520e;
            --panel:#114d11;
            --accent:#e6f7e6;
            --card-radius:12px;
            --card-width:120px;
        }
        
        *{
            box-sizing:border-box;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }

        body{
            margin:0;
            background:linear-gradient(180deg,var(--bg),#073807 140%);
            color:var(--accent);
            padding:20px;
            min-height:100vh;
        }

        header{
            display:flex;
            align-items:center;
            justify-content:center;
            gap:12px;
            margin-bottom:18px;
        }

        h1{
            margin:0;
            font-size:2em;
            letter-spacing:0.6px;
        }

        .cards{
            justify-content: space-between;
            gap: 20px;
            padding: 10px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr;
            width: 100%;
            color:white;
        }
        .left-card.right-card{
            border-radius: 8px;
        }
        .left-card{
            grid-column: 2;
            transform:rotate(1deg);
        }
        .right-card{
            grid-column: 5;

            animation: shake 1s alternate infinite;
        }

        @keyframes shake{
            from{
                transform: rotate(-3deg);
            }to{
                transform: rotate(3deg);
            }
        }
        .roundselector{
            min-width:160px
        }
        .round{
            font-size:12px;
            color:#cfe6cf;
        }
        .round-count{
            font-weight:700;
            font-size:18px;
        }

        .status-row{
            display:flex;
            gap:20px;
            align-items:center;
            justify-content:center;
            margin-bottom:18px;
        }

        .pill{
            background:rgba(255,255,255,0.04);
            padding:10px 14px;
            border-radius:10px;
            min-width:120px;
            text-align:center;
            box-shadow:0 6px 12px rgba(0,0,0,0.25);
        }
        .pill .label{font-size:12px;color:#cfe6cf}
        .pill .val{font-weight:700;font-size:18px;margin-top:6px;color:#fff}
    </style>
</head>
<body>
    <header>
        <h1>♣️♥️ War - a card game ♠️♦️</h1>
    </header>

    <main>
        <div class="status-row">
            <div class="pill" id="player-panel">
                <div class="label">Player</div>
                <div class="val" id="player-score">0</div>
            </div>

            <div class="pill" id="round-panel">
                <div class="label">Round</div>
                <div class="val" id="round-count">0</div>
            </div>

            <div class="pill" id="opponent-panel">
                <div class="label">Opponent</div>
                <div class="val" id="opponent-score">0</div>
            </div>
        </div>

        <div class="controls">
                <button id="flip-btn">Flip Cards</button>
                <button id="reset-btn">Reset Scores</button>
            </div>

            <div class="cards" aria-live="polite">
                <div class="card-slot">
                    <div class="label">Your Card</div>
                    <img src="./assets/back.png" class="card" id="left-card" alt="player card">
            </div>

            <div class="card-slot">
                <div class="label">Opponent Card</div>
                    <img src="./assets/back.png" class="card" id="right-card" alt="opponent card">
                </div>
            </div>

            <div class="msg" id="message"></div>
        </div>
    </main>

    <footer>
    </footer>
</body>
</html>
