<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>War - a card game</title>
    <style>
        :root{
            --bg:#0e520e;
            --card-radius:12px;
            --card-width:120px;
        }
        
        *{
            box-sizing:border-box;

            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }

        body{
            background-color: #0e520e;
        }

        h1{
            text-align: center;

        }

        .cards{
            justify-content: space-between;
            gap: 20px;
            padding: 10px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr;
            width: 100%;
            color:white;
        }
        .left-card.right-card{
            border-radius: 8px;
        }
        .left-card{
            grid-column: 2;
            transform:rotate(1deg);
        }
        .right-card{
            grid-column: 5;

            animation: shake 1s alternate infinite;
        }

        @keyframes shake{
            from{
                transform: rotate(-3deg);
            }to{
                transform: rotate(3deg);
            }
        }
        .roundselector{
            min-width:160px
        }
        .round{
            font-size:12px;
            color:#cfe6cf;
        }
        .round-count{
            font-weight:700;
            font-size:18px;
        }
    </style>
</head>
<body>
    <header>
        <h1>♣️♥️ War - a card game ♠️♦️</h1>
    </header>

    <main>
        <div class="score-row">
            <div class="score">
                Player
                <strong id="player-score">0</strong>
            </div>

            <div class="score">
                Opponent
                <strong id="player-score">0</strong>
            </div>

            <div class="roundselector">
                <div class="round">
                    Round: 
                </div>
                <div class="round-count">0</div>
            </div>
        </div>

        <div class="controls">
                <button id="flip-btn">Flip Cards</button>
                <button id="reset-btn">Reset Scores</button>
            </div>

            <div class="cards" aria-live="polite">
                <div class="card-slot">
                    <div class="label">Your Card</div>
                    <img src="./assets/back.png" class="card" id="left-card" alt="player card">
            </div>

            <div class="card-slot">
                <div class="label">Opponent Card</div>
                    <img src="./assets/back.png" class="card" id="right-card" alt="opponent card">
                </div>
            </div>

            <div class="msg" id="message"></div>
        </div>
    </main>

    <footer>
    </footer>
</body>
</html>
