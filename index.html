<!DOCTYPE html>
<html>
<head>
    <title>War - a card game</title>
    <style>
        body{
            background-color: #0e520e;
        }

        h1{
            text-align: center;

        }

        .cards{
            justify-content: space-between;
            gap: 20px;
            padding: 10px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr;
            width: 100%;
            color:white;
        }
        .left-card.right-card{
            border-radius: 8px;
        }
        .left-card{
            grid-column: 2;
            transform:rotate(1deg);
        }
        .right-card{
            grid-column: 5;

            animation: shake 1s reverse infinite;
        }

        @keyframes shake{
            from{
                transform: rotate(-3deg);
            }to{
                transform: rotate(3deg);
            }
        }
    </style>
</head>
<body>
    <header>
    <h1>♣️♥️ War - a card game ♠️♦️</h1>
    </header>

    <main>
        <div class="cards">
            <div class="left-card">
                <p>Your Card</p>
                <img 
                    src="./assets/black.png" 
                    class="card"
                    id="left-card"
                >
            </div>

            <div class="right-card">
                <p class="right">Opponent Card</p>
                <img src="./assets/10C.png" class="card" id="right-card">
            </div>
        </div>
    </main>

    <footer>
    </footer>
</body>
</html>
