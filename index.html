<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>War - a card game</title>
    <style>
        :root{
            --bg:#0e520e;
            --panel:#114d11;
            --accent:#e6f7e6;
            --card-radius:12px;
            --card-width:120px;
        }
        
        *{
            box-sizing:border-box;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }

        body{
            margin:0;
            background:linear-gradient(180deg,var(--bg),#073807 140%);
            color:var(--accent);
            padding:20px;
            min-height:100vh;
        }

        header{
            display:flex;
            align-items:center;
            justify-content:center;
            gap:12px;
            margin-bottom:18px;
        }

        h1{
            margin:0;
            font-size:2em;
            letter-spacing:0.6px;
        }

        .status-row{
            display:flex;
            align-items:center;
            justify-content:center;
            margin-bottom:18px;
        }

        .pill{
            background:rgba(255,255,255,0.04);
            padding:10px 14px;
            border-radius:10px;
            min-width:120px;
            text-align:center;
            box-shadow:0 6px 12px rgba(0,0,0,0.25);
        }
        .pill .label{
            font-size:12px;
            color:#cfe6cf
        }
        .pill .val{
            font-weight:700;
            font-size:18px;
            margin-top:6px;
            color:#fff
        }

        .cards-area{
            display:flex;
            justify-content:center;
            gap:60px;
            align-items:flex-start;
            margin:22px 0;
        }

        @keyframes wobble {
            0%{ transform: translateY(0) rotate(0deg); }
            25%{ transform: translateY(-6px) rotate(-3deg); }
            50%{ transform: translateY(0) rotate(3deg); }
            75%{ transform: translateY(-4px) rotate(-2deg); }
            100%{ transform: translateY(0) rotate(0deg); }
        }
        @keyframes shakeLR {
            0%{ transform: translateX(0); }
            20%{ transform: translateX(-6px); }
            40%{ transform: translateX(6px); }
            60%{ transform: translateX(-4px); }
            80%{ transform: translateX(4px); }
            100%{ transform: translateX(0); }
        }
        img.animate {
            animation: wobble 1s ease-in-out, shakeLR 1s ease-in-out;
        }
        button{
            background:#fff;
            color:#0b3b0b;
            border:0;
            padding:10px 14px;
            border-radius: 8px;
            font-weight:700;
            box-shadow:0 6px 12px rgba(0,0,0,0.2);
        }
        button:active{transform:translateY(1px)}

    </style>
</head>
<body>
    <header>
        <h1>♣️♥️ War - a card game ♠️♦️</h1>
    </header>

    <main>
        <div class="status-row">
            <div class="pill" id="player-panel">
                <div class="label">Player</div>
                <div class="val" id="player-score">0</div>
            </div>

            <div class="pill" id="round-panel">
                <div class="label">Round</div>
                <div class="val" id="round-count">0</div>
            </div>

            <div class="pill" id="opponent-panel">
                <div class="label">Opponent</div>
                <div class="val" id="opponent-score">0</div>
            </div>
        </div>

        <div class="cards-area" role="group" aria-label="cards">
            <div class="card-box">
                <div class="label">Your Card</div>
                <img src="./assets/back.png" alt="your card" id="left-card" class="card">
            </div>

            <div class="card-box">
                <div class="label">Opponent Card</div>
                <img src="./assets/back.png" alt="opponent card" id="right-card" class="card">
            </div>
        </div>

        <div class="controls">
            <button id="flip-btn">Flip Cards</button>
            <button id="reset-btn">Reset Scores</button>
        </div>

        <div class="message" id="message">Ready.</div>
    </main>

    <footer>
    </footer>

    <script>
        const ranks=[{n:'2',v:2},{n:'3',v:3},{n:'4',v:4},{n:'5',v:5},{n:'6',v:6},{n:'7',v:7},{n:'8',v:8},{n:'9',v:9},{n:'10',v:10},{n:'J',v:11},{n:'Q',v:12},{n:'K',v:13},{n:'A',v:14}];
        const suits=['H','D','C','S'];
        const deck=[];
        const valueMap={};
    </script>
</body>
</html>
